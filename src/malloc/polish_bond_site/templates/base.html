<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ t.site_name }}{% endblock %}</title>

  <!-- Apply saved theme before the page renders to prevent FOUC -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-200">

  <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/{{ locale }}/" class="text-slate-700 dark:text-slate-200 hover:text-slate-900 dark:hover:text-white transition-colors">
        <span class="text-2xl font-bold tracking-tight">🏦 {{ t.site_name }}</span>
      </a>

      <div class="flex items-center gap-3">

        {# ── language switcher ── #}
        <div class="flex items-center gap-1 text-xs font-semibold">
          <a href="/en{{ path_suffix }}"
             class="px-1.5 py-0.5 rounded transition-colors
               {% if locale == 'en' %}text-blue-600 dark:text-blue-400{% else %}text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300{% endif %}">
            EN
          </a>
          <span class="text-slate-300 dark:text-slate-600">|</span>
          <a href="/pl{{ path_suffix }}"
             class="px-1.5 py-0.5 rounded transition-colors
               {% if locale == 'pl' %}text-blue-600 dark:text-blue-400{% else %}text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300{% endif %}">
            PL
          </a>
        </div>

        {# ── dark mode toggle ── #}
        <button id="theme-toggle"
                class="rounded-lg p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                title="Toggle dark mode"
                aria-label="Toggle dark mode">
          <svg id="icon-moon" class="block dark:hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" />
          </svg>
          <svg id="icon-sun" class="hidden dark:block w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" />
          </svg>
        </button>

      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-slate-200 dark:border-slate-700 py-6 text-center text-sm text-slate-400 dark:text-slate-500">
    {{ t.footer_data_source }} <a href="https://dane.gov.pl" target="_blank" class="underline hover:text-slate-600 dark:hover:text-slate-300">dane.gov.pl</a>
  </footer>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>

</body>
</html>
